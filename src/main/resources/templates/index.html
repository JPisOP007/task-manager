<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Manager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Task Manager</h1>
        <p class="text-muted">Manage your daily tasks efficiently</p>
    </div>

    <!-- Add Task Form -->
    <div class="card p-4 shadow-sm mb-4">
        <h4>Add Task</h4>
        <form th:action="@{/add}" method="post">
            <div class="row">
                <div class="col-md-8">
                    <input type="text" name="title" class="form-control" placeholder="Enter task..." required>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100">Add Task</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Task List -->
    <div class="card p-4 shadow-sm">
        <h4>Your Tasks</h4>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.id}"></td>
                    <td th:text="${task.title}"></td>
                    <td>
                        <a th:href="@{/delete/{id}(id=${task.id})}" 
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
